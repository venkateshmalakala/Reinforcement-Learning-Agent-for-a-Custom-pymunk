version: '3.8'

services:
  train-baseline:
    build: .
    volumes:
      - .:/app
    command: python train.py --reward_type baseline --timesteps 200000 --save_path models/ppo_baseline

  train-shaped:
    build: .
    volumes:
      - .:/app
    command: python train.py --reward_type shaped --timesteps 200000 --save_path models/ppo_shaped

  evaluate:
    build: .
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/app
    command: python evaluate.py --model_path models/ppo_shaped.zip --render

  plot:
    build: .
    volumes:
      - .:/app
    command: python plot.py